<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nobody — Security Partner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Consolas', 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { width: 400px; padding: 40px; border: 1px solid #1a1a2e; border-radius: 8px; background: #111; }
    .logo { text-align: center; font-size: 48px; margin-bottom: 16px; }
    h1 { text-align: center; font-size: 22px; margin-bottom: 4px; color: #00ff88; }
    .sub { text-align: center; font-size: 12px; color: #666; margin-bottom: 24px; }
    .btn { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: 14px; font-family: inherit; margin-bottom: 8px; }
    .btn-primary { background: #00ff88; color: #000; border: none; font-weight: bold; }
    .btn-outline { background: transparent; color: #00ff88; border-color: #00ff88; }
    .btn:hover { opacity: 0.8; }
    .err { color: #ff4444; text-align: center; font-size: 12px; margin-top: 8px; display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">👤</div>
  <h1>Nobody</h1>
  <div class="sub">Security Partner · v1.0</div>
  <div class="err" id="err"></div>
  <button class="btn btn-primary" onclick="go('nobody','nobody2025')">🚀 进入 Nobody</button>
  <button class="btn btn-outline" onclick="go('admin','admin123')">🔧 管理后台</button>
</div>
<script>
async function go(u, p) {
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    const d = await r.json();
    if (d.code === 0) {
      localStorage.setItem('token', d.data.token);
      localStorage.setItem('user', JSON.stringify(d.data.user));
      window.location.href = 'index.html';
    } else {
      document.getElementById('err').textContent = d.message; document.getElementById('err').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('err').textContent = '连接失败'; document.getElementById('err').style.display = 'block';
  }
}
</script>
</body>
</html>
