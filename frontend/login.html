<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Nobody — Security Partner</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#e0e0e0;font-family:'Consolas','Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{width:400px;padding:40px;border:1px solid #1a1a2e;border-radius:8px;background:#111;text-align:center}
    .logo{font-size:48px;margin-bottom:16px}
    h1{font-size:22px;color:#00ff88;margin-bottom:4px}
    .sub{font-size:12px;color:#666;margin-bottom:24px}
    .btn{width:100%;padding:14px;background:#00ff88;color:#000;border:none;border-radius:6px;cursor:pointer;font-size:16px;font-weight:bold;font-family:inherit;margin-bottom:8px}
    .btn:hover{opacity:0.8}
    .btn-outline{background:transparent;color:#00ff88;border:1px solid #00ff88}
    input{width:100%;padding:10px;background:#0a0a0a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-family:inherit;font-size:13px;margin-bottom:8px;text-align:center;display:none}
    input:focus{border-color:#00ff88;outline:none}
    .tagline{font-size:11px;color:#444;margin-top:12px}
    .err{color:#ff4444;font-size:12px;margin-top:8px;display:none}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">👤</div>
  <h1>Nobody</h1>
  <div class="sub">no0boy 的安全搭档 · v2.0</div>
  <div class="err" id="err"></div>

  <button class="btn" onclick="enterGuest()">进入（游客）</button>
  <button class="btn btn-outline" onclick="showAdmin()">管理员</button>
  <input type="password" id="pwd" placeholder="管理员密码" onkeydown="if(event.key==='Enter')enterAdmin()">
  <button class="btn" id="adminBtn" onclick="enterAdmin()" style="display:none;">以管理员进入</button>

  <div class="tagline">游客可体验 · 管理员管理记忆和知识</div>
</div>

<script>
function enterGuest() {
  localStorage.removeItem('admin_key');
  window.location.href = 'index.html';
}
function showAdmin() {
  document.getElementById('pwd').style.display = 'block';
  document.getElementById('adminBtn').style.display = 'block';
}
function enterAdmin() {
  const pwd = document.getElementById('pwd').value;
  // 服务端验证管理员身份，前端只是传递 X-Admin header
  localStorage.setItem('admin_key', pwd);
  window.location.href = 'index.html';
}
</script>
</body>
</html>
