<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nobody — Companion</title>
<style>
:root{--bg:#0a0a0a;--surface:#111111;--border:#1a1a1a;--text:#d4d4d4;--dim:#666;--accent:#00ff88;--warn:#ff8800;--red:#ff4444;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Mono','Consolas',monospace;display:flex;height:100vh;overflow:hidden}
nav{width:180px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0}
.nav-brand{padding:0 16px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
.nav-brand h1{font-size:15px;color:var(--accent);font-weight:600}
.nav-brand .sub{font-size:10px;color:var(--dim);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;color:var(--dim);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--accent);background:rgba(0,255,136,0.05);border-right:2px solid var(--accent)}
.nav-footer{padding:16px;border-top:1px solid var(--border);margin-top:auto;font-size:10px;color:var(--dim)}
main{flex:1;display:flex;flex-direction:column;min-width:0}
.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.active{display:flex}
/* 聊天 */
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px}
.chat-header .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.chat-msgs .welcome{text-align:center;padding:60px 20px;color:var(--dim)}
.chat-msgs .welcome .icon{font-size:48px}
.chat-msgs .welcome h2{color:var(--accent);margin:12px 0 4px;font-size:18px}
.msg{display:flex;gap:10px;max-width:85%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.msg .bubble{padding:10px 14px;border-radius:var(--radius);font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:#1a1a2e}
.msg.ai .bubble{background:var(--surface);border:1px solid var(--border)}
.agent-tag{font-size:10px;color:var(--accent);margin-bottom:4px}
.chat-input{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:13px;outline:none}
.chat-input input:focus{border-color:var(--accent)}
.chat-input button{padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);cursor:pointer;font-weight:600;font-family:inherit}
.chat-input .qsave{padding:10px 12px;background:transparent;color:var(--dim);font-size:16px;font-weight:normal}
/* 时间线 / 我 面板 */
.content-panel{padding:24px;overflow-y:auto;flex:1}
.content-panel h2{font-size:16px;color:var(--accent);margin-bottom:16px}
.tl-day{margin-bottom:16px}
.tl-date{font-size:11px;color:var(--accent);margin-bottom:4px;font-weight:600}
.tl-item{font-size:12px;padding:4px 0 4px 12px;color:var(--text);border-left:1px solid var(--border)}
.tl-item .tl-type{font-size:10px;color:var(--dim)}
.profile-section{margin-bottom:20px}
.profile-section h3{font-size:13px;color:var(--warn);margin-bottom:8px}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)}
.profile-row .key{color:var(--dim)}
.profile-row .val{color:var(--text)}
.edit-row{display:flex;gap:6px;margin-top:8px}
.edit-row input{flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:11px}
.edit-row button{padding:6px 12px;background:var(--accent);color:#000;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:11px}
.quick-bar{padding:0 20px 8px;display:flex;gap:6px}
.qa-btn{padding:4px 10px;font-size:10px;border:1px solid var(--border);border-radius:12px;color:var(--dim);cursor:pointer;transition:all .15s}
.qa-btn:hover,.qa-btn.on{color:var(--warn);border-color:var(--warn)}
@media(max-width:768px){nav{width:50px}.nav-brand h1,.nav-item span,.nav-footer{display:none}}
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><h1>Nobody</h1><div class="sub" id="navGreet">v3.0</div></div>
  <button class="nav-item active" data-panel="chat"><span>💬</span> 对话</button>
  <button class="nav-item" data-panel="timeline"><span>📅</span> 时间线</button>
  <button class="nav-item" data-panel="me"><span>👤</span> 我</button>
  <div class="nav-footer">no0boy 的搭档</div>
</nav>

<main>
  <!-- 💬 对话 -->
  <div class="panel active" id="panel-chat">
    <div class="chat-header"><div class="dot"></div>Nobody 在线 · <span id="modeLabel" style="color:var(--dim)">游客</span></div>
    <div class="chat-msgs" id="msgs">
      <div class="welcome"><div class="icon">👤</div><h2>Nobody 在线</h2><p>你的安全搭档。问吧。</p></div>
    </div>
    <div class="quick-bar" id="quickBar" style="display:none">
      <span class="qa-btn" id="qaMem" onclick="toggleMem()">🧠 记忆</span>
    </div>
    <div class="chat-input">
      <input id="q" placeholder="向 Nobody 提问..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
      <button class="qsave" onclick="quickSave()" title="快速记录">➕</button>
    </div>
  </div>

  <!-- 📅 时间线 -->
  <div class="panel" id="panel-timeline">
    <div class="content-panel">
      <h2>📅 成长轨迹</h2>
      <div id="timelineContent"><div style="color:var(--dim);text-align:center;padding:40px;">加载中...</div></div>
    </div>
  </div>

  <!-- 👤 我 -->
  <div class="panel" id="panel-me">
    <div class="content-panel">
      <h2>👤 我的画像</h2>
      <div class="profile-section">
        <h3>身份</h3>
        <div id="profileView"><div style="color:var(--dim)">加载中...</div></div>
        <div class="edit-row">
          <input id="proKey" placeholder="字段 (name/role/goals/level)">
          <input id="proVal" placeholder="值">
          <button onclick="saveProfile()">保存</button>
        </div>
      </div>
      <div class="profile-section">
        <h3>偏好</h3>
        <div id="prefView"><div style="color:var(--dim)">加载中...</div></div>
        <div class="edit-row">
          <input id="prefKey" placeholder="字段 (language/depth/code_style/tone)">
          <input id="prefVal" placeholder="值">
          <button onclick="savePref()">保存</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const ADMIN_KEY = localStorage.getItem('admin_key') || '';
const IS_ADMIN = ADMIN_KEY.length >= 6;
let MEM_MODE = false;

if (IS_ADMIN) {
  document.getElementById('modeLabel').textContent = 'Master';
  document.getElementById('modeLabel').style.color = 'var(--warn)';
  document.getElementById('quickBar').style.display = 'flex';
}

// ====== 导航 ======
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(pn => pn.classList.remove('active'));
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'timeline') loadTimeline();
    if (btn.dataset.panel === 'me') loadMe();
  });
});

// ====== 记忆开关 ======
function toggleMem() {
  MEM_MODE = !MEM_MODE;
  const el = document.getElementById('qaMem');
  el.classList.toggle('on', MEM_MODE);
  el.textContent = MEM_MODE ? '🧠 开' : '🧠 记忆';
}

// ====== 快速记录 ======
async function quickSave() {
  if (!IS_ADMIN) { alert('仅 Master 可用'); return; }
  const text = prompt('📝 记下（学到了什么 / 想记住的 / 想法）：');
  if (!text || !text.trim()) return;
  try {
    await fetch('/api/journal/learn', {
      method:'POST',headers:{'Content-Type':'application/json','X-Admin':ADMIN_KEY},
      body:JSON.stringify({summary:text.trim(),detail:'',tags:[],type:'learning'})
    });
  } catch(e) { alert('保存失败'); }
}

// ====== 聊天 ======
async function send() {
  const q = document.getElementById('q'); const text = q.value.trim();
  if (!text) return; q.value = '';
  document.querySelector('.welcome')?.remove();
  const msgs = document.getElementById('msgs');

  msgs.innerHTML += `<div class="msg user"><div class="bubble">${esc(text)}</div></div>`;
  const aiDiv = document.createElement('div'); aiDiv.className = 'msg ai';
  aiDiv.innerHTML = '<div><div class="agent-tag">思考...</div><div class="bubble" id="bub"></div></div>';
  msgs.appendChild(aiDiv); msgs.scrollTop = msgs.scrollHeight;

  const bubble = aiDiv.querySelector('#bub'), tag = aiDiv.querySelector('.agent-tag');
  let full = '';
  try {
    const h = {'Content-Type':'application/json'}; if (IS_ADMIN) h['X-Admin'] = ADMIN_KEY;
    const res = await fetch('/api/conversation/talk', {method:'POST',headers:h,body:JSON.stringify({question:text,stream:true})});
    const reader = res.body.getReader(), dec = new TextDecoder();
    while (true) {
      const {done,value} = await reader.read(); if (done) break;
      for (const line of dec.decode(value,{stream:true}).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const p = JSON.parse(line.slice(6));
          if (p.type === 'agent') {
            const sev = {P0:'#ff0000',P1:'#ff8800',P2:'#ffdd00',INFO:'var(--accent)'};
            tag.innerHTML = `${p.emoji} ${p.name} · <span style="color:${sev[p.severity]||'var(--accent)'}">${p.severity}</span>`;
          } else if (p.type === 'skills' && p.skills?.length) {
            tag.innerHTML += ` · ${p.skills.map(s=>s.display||s.name).join(', ')}`;
          } else if (p.type === 'chunk') { full += p.text; bubble.textContent = full; }
        } catch(e) {}
      }
      msgs.scrollTop = msgs.scrollHeight;
    }
  } catch(e) { bubble.textContent = '连接失败'; tag.textContent = '离线'; }

  // 记忆模式：自动存为 Journal
  if (IS_ADMIN && MEM_MODE && full && text.length > 20) {
    try {
      await fetch('/api/journal/entry', {
        method:'POST',headers:{'Content-Type':'application/json','X-Admin':ADMIN_KEY},
        body:JSON.stringify({type:'note',summary:text.slice(0,200),detail:full.slice(0,500),tags:[]})
      });
    } catch(e) {}
  }
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ====== 时间线 ======
async function loadTimeline() {
  if (!IS_ADMIN) { document.getElementById('timelineContent').innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">登录 Master 后查看</div>'; return; }
  try {
    const [tlRes, memRes] = await Promise.all([
      fetch('/api/journal/timeline?days=60', {headers:{'X-Admin':ADMIN_KEY}}),
      fetch('/api/journal/memories?limit=10', {headers:{'X-Admin':ADMIN_KEY}})
    ]);
    const tl = await tlRes.json();
    const mem = await memRes.json();

    let html = '';
    const days = tl.data || [];

    if (days.length === 0) {
      html += '<div style="text-align:center;padding:40px;color:var(--dim);">还没有记录。<br><br>在对话中点 ➕ 记下你学到的。</div>';
    } else {
      days.forEach(day => {
        html += `<div class="tl-day"><div class="tl-date">${esc(day.date)}</div>`;
        (day.events||[]).forEach(ev => {
          html += `<div class="tl-item">${esc(ev)}</div>`;
        });
        html += '</div>';
      });
    }

    // 记忆
    const mems = mem.data || [];
    if (mems.length > 0) {
      html += '<h2 style="margin-top:24px;">🧠 长期记忆</h2>';
      mems.forEach(m => {
        html += `<div class="tl-item"><span class="tl-type">${esc(m.type)}</span> ${esc(m.summary)}</div>`;
      });
    }

    document.getElementById('timelineContent').innerHTML = html;
  } catch(e) {
    document.getElementById('timelineContent').innerHTML = '<div style="color:var(--red)">加载失败</div>';
  }
}

// ====== 我 ======
async function loadMe() {
  if (!IS_ADMIN) { return; }
  try {
    const [proRes, prefRes] = await Promise.all([
      fetch('/api/profile', {headers:{'X-Admin':ADMIN_KEY}}),
      fetch('/api/profile/preferences', {headers:{'X-Admin':ADMIN_KEY}})
    ]);
    const pro = await proRes.json();
    const pref = await prefRes.json();

    const profile = pro.data?.profile || {};
    document.getElementById('profileView').innerHTML = Object.keys(profile).length
      ? Object.entries(profile).map(([k,v]) =>
          `<div class="profile-row"><span class="key">${esc(k)}</span><span class="val">${esc(typeof v==='object'?JSON.stringify(v):String(v))}</span></div>`
        ).join('')
      : '<div style="color:var(--dim);font-size:12px;">尚未设置。在上方填写你的信息。</div>';

    const prefs = pref.data?.preferences || {};
    document.getElementById('prefView').innerHTML = Object.keys(prefs).length
      ? Object.entries(prefs).map(([k,v]) =>
          `<div class="profile-row"><span class="key">${esc(k)}</span><span class="val">${esc(String(v))}</span></div>`
        ).join('')
      : '<div style="color:var(--dim);font-size:12px;">使用默认偏好。</div>';

  } catch(e) {}
}

async function saveProfile() {
  const k = document.getElementById('proKey').value.trim();
  const v = document.getElementById('proVal').value.trim();
  if (!k||!v) return;
  await fetch('/api/profile', {
    method:'PUT',headers:{'Content-Type':'application/json','X-Admin':ADMIN_KEY},
    body:JSON.stringify({key:k,value:v})
  });
  document.getElementById('proKey').value = '';
  document.getElementById('proVal').value = '';
  loadMe();
}

async function savePref() {
  const k = document.getElementById('prefKey').value.trim();
  const v = document.getElementById('prefVal').value.trim();
  if (!k||!v) return;
  await fetch('/api/profile/preferences', {
    method:'PUT',headers:{'Content-Type':'application/json','X-Admin':ADMIN_KEY},
    body:JSON.stringify({key:k,value:v})
  });
  document.getElementById('prefKey').value = '';
  document.getElementById('prefVal').value = '';
  loadMe();
}

// ====== 初始加载 ======
if (IS_ADMIN) {
  fetch('/api/conversation/welcome', {headers:{'X-Admin':ADMIN_KEY}})
    .then(r => r.json()).then(d => {
      if (d.data?.profile?.name) {
        document.getElementById('navGreet').textContent = d.data.profile.name;
      }
    }).catch(()=>{});
}

// 游客也能看到导航切换
document.querySelectorAll('[data-panel="timeline"]').forEach(b => {
  b.addEventListener('click', loadTimeline);
});
document.querySelectorAll('[data-panel="me"]').forEach(b => {
  b.addEventListener('click', loadMe);
});
</script>
</body>
</html>
