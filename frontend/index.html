<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nobody — Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Consolas','Courier New',monospace; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px 20px; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; }
    .header .title { color: #00ff88; font-weight: bold; }
    .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 10px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai { align-self: flex-start; }
    .msg .bubble { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
    .msg.user .bubble { background: #1a1a2e; color: #e0e0e0; }
    .msg.ai .bubble { background: #0f1a0f; border: 1px solid #1a3a1a; }
    .msg .avatar { font-size: 20px; }
    .agent-tag { font-size: 10px; color: #00ff88; margin-bottom: 4px; }
    .input-area { padding: 12px 20px; border-top: 1px solid #1a1a2e; display: flex; gap: 8px; }
    .input-area input { flex: 1; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-family: inherit; font-size: 13px; outline: none; }
    .input-area input:focus { border-color: #00ff88; }
    .input-area button { padding: 10px 20px; background: #00ff88; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: inherit; }
    .welcome { text-align: center; padding: 60px 20px; color: #555; }
    .welcome .icon { font-size: 48px; }
    .welcome p { margin-top: 10px; }
  </style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <span class="title">Nobody</span>
  <span style="color:#555;font-size:12px;">online</span>
  <span style="margin-left:auto;font-size:11px;color:#555;cursor:pointer;" onclick="logout()">exit</span>
</div>

<div class="msg-area" id="msgs">
  <div class="welcome">
    <div class="icon"><svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="30" r="28" fill="#1a1a2e" stroke="#00ff88" stroke-width="1.5"/>
      <ellipse cx="30" cy="22" rx="14" ry="12" fill="#111"/>
      <rect x="14" y="8" width="32" height="8" rx="2" fill="#0a0a0a"/>
      <rect x="18" y="3" width="24" height="7" rx="3" fill="#111"/>
      <circle cx="23" cy="22" r="3" fill="#00ff88"/>
      <circle cx="37" cy="22" r="3" fill="#00ff88"/>
      <rect x="22" y="32" width="16" height="2" rx="1" fill="#00ff88"/>
      <path d="M20 36 Q30 42 40 36" stroke="#00ff88" stroke-width="1.5" fill="none"/>
    </svg></div>
    <p>Nobody 在线。问吧。</p>
    <p style="font-size:11px;color:#444;">try: SQL注入是什么 | CVE怎么查 | OWASP Top10</p>
  </div>
</div>

<div class="input-area">
  <input id="q" placeholder="向 Nobody 提问..." onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">发送</button>
</div>

<script>
function logout() { localStorage.clear(); window.location.href = 'login.html'; }

async function send() {
  const q = document.getElementById('q');
  const text = q.value.trim();
  if (!text) return;
  q.value = '';

  document.querySelector('.welcome')?.remove();
  const msgs = document.getElementById('msgs');

  // 用户消息
  msgs.innerHTML += `<div class="msg user"><div class="bubble">${esc(text)}</div><div class="avatar">👤</div></div>`;

  // AI 消息占位
  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg ai';
  aiDiv.innerHTML = '<div class="avatar">👤</div><div><div class="agent-tag">思考中...</div><div class="bubble" id="aiBubble"></div></div>';
  msgs.appendChild(aiDiv);
  msgs.scrollTop = msgs.scrollHeight;

  const bubble = aiDiv.querySelector('#aiBubble');
  const tag = aiDiv.querySelector('.agent-tag');
  let full = '';

  try {
    const token = localStorage.getItem('token');
    const res = await fetch('/api/chat/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ question: text, stream: true })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of decoder.decode(value, { stream: true }).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const p = JSON.parse(line.slice(6));
          if (p.type === 'agent') tag.textContent = `${p.emoji} ${p.name}`;
          else if (p.type === 'chunk') { full += p.text; bubble.textContent = full; }
          else if (p.type === 'done') { tag.textContent = `${tag.textContent} · 完毕`; }
        } catch(e) {}
      }
      msgs.scrollTop = msgs.scrollHeight;
    }
  } catch(e) {
    bubble.textContent = '连接失败：' + e.message;
    tag.textContent = '👤 Nobody · 离线';
  }
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
